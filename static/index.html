<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#060A12" />
<link rel="manifest" href="/manifest.json" />
<title>Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/styles.css" />
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
<div class="grid-bg"></div>
<div id="app">

  <header class="statusbar">
    <div class="brand"><span class="reactor-mini"></span>COCKPIT<span class="ver">v1</span></div>
    <div class="status-right">
      <span class="live"><span class="pulse"></span><span id="liveTxt">SYNCED</span></span>
      <button id="syncBtn" class="sync">⟳</button>
    </div>
  </header>

  <!-- HERO: arc reactor net worth core -->
  <section class="core">
    <div class="reactor">
      <svg class="rings" viewBox="0 0 240 240" aria-hidden="true">
        <circle class="ring-track" cx="120" cy="120" r="108"/>
        <circle class="ring r1" cx="120" cy="120" r="108"/>
        <circle class="ring r2" cx="120" cy="120" r="92"/>
        <g class="ticks" id="ticks"></g>
        <circle class="ring r3" cx="120" cy="120" r="74"/>
      </svg>
      <div class="core-readout">
        <div class="eyebrow">NET WORTH</div>
        <div class="core-value" id="netWorth">—</div>
        <div class="core-delta" id="nwDelta"></div>
      </div>
    </div>
  </section>

  <!-- portfolio chart -->
  <section class="panel chartpanel">
    <div class="panel-head"><span class="eyebrow">PORTFOLIO · 45D</span><span class="eyebrow" id="chartRange"></span></div>
    <div class="chart-wrap"><svg id="chart" viewBox="0 0 600 200" preserveAspectRatio="none"></svg>
      <div class="chart-readout" id="chartReadout"></div></div>
  </section>

  <!-- accounts strip (Schwab-style consolidated) -->
  <div class="eyebrow section-label">ACCOUNTS<button id="addAcct" class="mini-link">+ LINK</button></div>
  <section class="accounts" id="accounts"></section>

  <!-- safe to invest + allocation -->
  <div class="duo">
    <section class="panel invest">
      <div class="eyebrow">SAFE TO DEPLOY</div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 160 160" class="gauge-svg"><circle class="g-track" cx="80" cy="80" r="64"/><circle class="g-fill" id="gFill" cx="80" cy="80" r="64"/></svg>
        <div class="gauge-center"><div class="invest-val" id="safeInvest">—</div><div class="eyebrow tiny">INVESTABLE</div></div>
      </div>
      <div class="invest-note" id="investNote"></div>
    </section>
    <section class="panel alloc">
      <div class="eyebrow">ALLOCATION</div>
      <div class="donut-wrap"><svg viewBox="0 0 160 160" id="donut" class="donut"></svg></div>
      <div class="alloc-legend" id="allocLegend"></div>
    </section>
  </div>

  <!-- MISSION: road, flow, goals, plan -->
  <div class="eyebrow section-label">ROAD TO $100K</div>
  <section class="panel road" id="road"></section>

  <div class="eyebrow section-label">INCOME FLOW · MONTHLY SPLIT<span class="left-tag" id="incomeTag"></span></div>
  <section class="panel flow" id="flow"></section>

  <div class="eyebrow section-label">GOALS</div>
  <section class="goals" id="goals"></section>

  <div class="eyebrow section-label">WEALTH PLAN · HALAL<span class="left-tag" id="surplusTag"></span></div>
  <section class="panel waterfall" id="waterfall"></section>

  <!-- spending envelopes -->
  <div class="eyebrow section-label">SPENDING · THIS MONTH<span class="left-tag" id="leftTag"></span></div>
  <section class="panel envelopes" id="envelopes"></section>
  <button id="addEnvelope" class="hud-btn">ADJUST BUDGETS</button>

  <!-- recurring -->
  <div class="eyebrow section-label">RECURRING · LOCKED IN<span class="left-tag" id="recurTag"></span></div>
  <section class="panel txns" id="recurList"></section>

  <!-- activity -->
  <div class="eyebrow section-label">ACTIVITY</div>
  <section class="panel txns" id="txnList"></section>

  <button id="connectBtn" class="connect hidden">LINK ACCOUNT</button>
  <footer class="foot"><span id="footStatus"></span></footer>
</div>

<div id="sheet" class="sheet hidden">
  <div class="sheet-inner">
    <div class="sheet-head"><span class="eyebrow">MONTHLY BUDGETS</span><button id="closeSheet" class="hud-btn sm">DONE</button></div>
    <div id="budgetEditor"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
